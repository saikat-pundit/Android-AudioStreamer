name: Android Audio Streamer CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Prepare Logo
      run: |
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        if [ -f logo.png ]; then
          # 1. Fallback icon for older Android versions
          cp logo.png app/src/main/res/drawable/ic_launcher.png
          
          # 2. Foreground layer for modern Adaptive Icons
          cp logo.png app/src/main/res/drawable/ic_launcher_foreground.png
          
          # 3. Automatically write the Adaptive Icon XML file
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/white" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF
        fi

    - name: Build with Gradle
      run: gradle assembleDebug  # Changed from ./gradlew to gradle

    # ADD THIS NEW STEP:
    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Streamer.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Audio-Streamer-App
        # UPDATE THIS PATH:
        path: app/build/outputs/apk/debug/Streamer.apk
